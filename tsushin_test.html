<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>保存済みURL通信テスト</title>
<style>
  body { font-family: sans-serif; padding: 16px; font-size: 16px; }
  #log { white-space: pre-wrap; background: #f0f0f0; padding: 10px; border-radius: 8px; margin-top: 10px; word-break: break-all; }
  button { padding: 14px; font-size: 16px; width: 100%; margin-top: 10px; }
</style>
</head>
<body>

<h3>保存済みURLで通信テスト</h3>
<p>「棚卸アプリ」で保存したURL（localStorage）を、そのまま読み出して同じテストをします。</p>
<button onclick="showSaved()">①保存されているURLを1文字ずつ表示</button>
<button onclick="testWithSaved()">②保存されているURLでJSONPテスト</button>
<button onclick="testHardcoded()">③直接書いたURLでJSONPテスト（比較用）</button>
<div id="log">まだ何も実行していません。</div>

<script>
const HARDCODED_URL = 'https://script.google.com/macros/s/AKfycbw_oZCNRTlFa_tSDCNdqjrZBq13d-2XXRIK956fI_E7YuxylheRBz9qjbzJrB-qiTq6WQ/exec';

function log(msg) {
  document.getElementById('log').textContent += '\n' + msg;
}

function showSaved() {
  document.getElementById('log').textContent = '';
  const raw = localStorage.getItem('inventory_script_url');
  if (!raw) {
    log('（このページのlocalStorageには何も保存されていません＝app.htmlと保存場所が違う可能性があります）');
    return;
  }
  log('保存値の長さ: ' + raw.length + '文字');
  log('ハードコード値の長さ: ' + HARDCODED_URL.length + '文字');
  log('完全一致するか: ' + (raw === HARDCODED_URL));
  log('');
  log('--- 1文字ずつの文字コード比較（違う場所だけ表示） ---');
  const maxLen = Math.max(raw.length, HARDCODED_URL.length);
  let diffCount = 0;
  for (let i = 0; i < maxLen; i++) {
    const a = raw[i] || '(無し)';
    const b = HARDCODED_URL[i] || '(無し)';
    if (a !== b) {
      diffCount++;
      log('位置' + i + ': 保存値=[' + a + '](U+' + (raw.charCodeAt(i) || 0).toString(16) + ') / ハードコード値=[' + b + '](U+' + (HARDCODED_URL.charCodeAt(i) || 0).toString(16) + ')');
    }
  }
  if (diffCount === 0) log('違いは見つかりませんでした（完全に同一の文字列です）');
}

function testWithSaved() {
  const raw = localStorage.getItem('inventory_script_url');
  document.getElementById('log').textContent = '②保存値でJSONP開始: ' + new Date().toLocaleTimeString();
  if (!raw) { log('保存値がありません'); return; }
  runJsonpTest(raw, '②');
}

function testHardcoded() {
  document.getElementById('log').textContent = '③ハードコード値でJSONP開始: ' + new Date().toLocaleTimeString();
  runJsonpTest(HARDCODED_URL, '③');
}

function runJsonpTest(base, label) {
  const callbackName = 'cb_' + Date.now();
  const url = base + '?action=matchGetSummary&callback=' + callbackName;
  const script = document.createElement('script');
  const timer = setTimeout(() => log(label + 'タイムアウト（10秒応答なし）'), 10000);
  window[callbackName] = (data) => {
    clearTimeout(timer);
    log(label + '成功: ' + JSON.stringify(data));
  };
  script.onerror = () => {
    clearTimeout(timer);
    log(label + 'onerrorが発火（読み込み失敗）');
  };
  script.src = url;
  log(label + 'リクエストURL: ' + url);
  document.body.appendChild(script);
}
</script>
</body>
</html>
